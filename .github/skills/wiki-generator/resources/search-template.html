<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="wiki-generated" content="{{DATE}}">
<meta name="wiki-source-rev" content="{{GIT_SHA}}">
<!--
  SEARCH TEMPLATE — Global Full-Text Search Page
  Replace all {{PLACEHOLDERS}} before use:
    {{PROJECT_NAME}}      — Project display name
    {{PROJECT_THEME_KEY}} — localStorage key prefix (e.g., "keiko")

  Requires: search-index.json in the same directory (generated by build-search-index.py)
  The JSON format: [{"title":"Page Title","path":"relative/path.html","excerpt":"text snippet...","headings":["H2 text","H3 text"]}]
-->
<title>{{PROJECT_NAME}} — Search Wiki</title>
<style>
/* === Dark theme (default) === */
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--text-muted:#8b949e;--accent:#58a6ff;--accent2:#3fb950;--accent3:#d29922;--accent4:#f85149;--heading:#f0f6fc;--code-bg:#1c2128}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;max-width:1200px;margin:0 auto;padding:2rem 2rem 4rem}
h1{color:var(--heading);font-size:2.4rem;margin:1rem 0;border-bottom:2px solid var(--accent);padding-bottom:.6rem}
h2{color:var(--accent);font-size:1.7rem;margin:2.5rem 0 1rem;border-bottom:1px solid var(--border);padding-bottom:.4rem}
p{margin:.6rem 0}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
.breadcrumb{font-size:.85rem;color:var(--text-muted);margin-bottom:.5rem;padding:.4rem 0}
.breadcrumb a{color:var(--accent)}
.footer{text-align:center;color:var(--text-muted);font-size:.85rem;margin-top:3rem;padding-top:1rem;border-top:1px solid var(--border)}
.footer a{color:var(--accent)}
.search-input{width:100%;padding:.8rem 1.2rem;font-size:1.1rem;background:var(--surface);color:var(--text);border:2px solid var(--border);border-radius:10px;margin:1.5rem 0;font-family:inherit;transition:border-color .2s}
.search-input:focus{outline:none;border-color:var(--accent)}
.search-input::placeholder{color:var(--text-muted)}
.result-count{color:var(--text-muted);font-size:.9rem;margin-bottom:1rem}
.result{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.2rem;margin:.8rem 0;transition:border-color .2s}
.result:hover{border-color:var(--accent)}
.result a{font-size:1.15rem;font-weight:600;color:var(--accent)}
.result .path{font-size:.8rem;color:var(--text-muted);margin:.2rem 0}
.result .excerpt{font-size:.9rem;color:var(--text);margin-top:.4rem}
.result .excerpt mark{background:var(--accent3);color:#000;padding:1px 3px;border-radius:3px}
.result .headings{font-size:.82rem;color:var(--text-muted);margin-top:.4rem}
.result .headings span{margin-right:.8rem}
.no-results{text-align:center;padding:3rem 1rem;color:var(--text-muted);font-size:1.1rem}

/* === Light theme === */
[data-theme="light"]{--bg:#ffffff;--surface:#f6f8fa;--border:#d0d7de;--text:#1f2328;--text-muted:#656d76;--accent:#0969da;--accent2:#1a7f37;--accent3:#9a6700;--accent4:#cf222e;--heading:#1f2328;--code-bg:#f6f8fa}
[data-theme="light"] .result .excerpt mark{background:#fff3cd;color:#1f2328}

/* === Theme toggle button === */
.theme-toggle{position:fixed;top:1rem;right:1rem;z-index:1000;background:var(--surface);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:var(--text);transition:background .2s,border-color .2s;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.theme-toggle:hover{border-color:var(--accent)}

/* === Skip-link (accessibility) === */
.skip-link{position:absolute;top:-100%;left:1rem;background:var(--accent);color:#fff;padding:.5rem 1rem;border-radius:0 0 6px 6px;z-index:2000;font-size:.9rem;text-decoration:none;transition:top .2s}
.skip-link:focus{top:0}

/* === Back-to-top button === */
.back-to-top{position:fixed;bottom:2rem;right:2rem;z-index:1000;background:var(--surface);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:1.3rem;color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.15);transition:opacity .2s,border-color .2s}
.back-to-top.visible{display:flex}
.back-to-top:hover{border-color:var(--accent);color:var(--accent)}

/* === Print === */
@media print{.theme-toggle,.skip-link,.back-to-top{display:none!important}body{max-width:100%;padding:1rem;color:#1f2328;background:#fff}:root{--bg:#fff;--surface:#f6f8fa;--border:#d0d7de;--text:#1f2328;--text-muted:#656d76;--accent:#0969da;--heading:#1f2328}.search-input{display:none}.result{break-inside:avoid}}
</style>
</head><body>
<a href="#main" class="skip-link">Skip to content</a>
<button class="theme-toggle" id="themeToggle" title="Toggle light/dark theme" aria-label="Toggle light/dark theme">&#9790;</button>
<button class="back-to-top" id="backToTop" title="Back to top" aria-label="Back to top">&#8679;</button>

<nav class="breadcrumb" role="navigation" aria-label="Breadcrumb"><a href="index.html">{{PROJECT_NAME}}</a> &rsaquo; Search</nav>
<main id="main">
<h1>Search Wiki</h1>
<input type="text" class="search-input" id="searchInput" placeholder="Search pages, headings, and content…" autofocus>
<div class="result-count" id="resultCount"></div>
<div id="results"></div>
<div class="no-results" id="noResults" style="display:none">No matching pages found. Try different keywords.</div>

<div class="footer"><a href="index.html">&larr; Back to {{PROJECT_NAME}} Wiki</a> &nbsp;|&nbsp; <a href="glossary.html">Glossary</a></div>
</main>

<script>
(function(){
  var searchInput=document.getElementById('searchInput');
  var resultsDiv=document.getElementById('results');
  var resultCount=document.getElementById('resultCount');
  var noResults=document.getElementById('noResults');
  var index=[];

  // Load search index
  var xhr=new XMLHttpRequest();
  xhr.open('GET','search-index.json',true);
  xhr.onload=function(){
    if(xhr.status===200){try{index=JSON.parse(xhr.responseText);}catch(e){console.warn('Failed to parse search-index.json:',e);}}
  };
  xhr.send();

  function escapeRegex(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}

  function highlightExcerpt(text,terms){
    if(!terms.length)return text;
    var pattern=new RegExp('('+terms.map(escapeRegex).join('|')+')','gi');
    return text.replace(pattern,'<mark>$1</mark>');
  }

  function search(query){
    var q=query.toLowerCase().trim();
    resultsDiv.innerHTML='';
    if(!q){resultCount.textContent='';noResults.style.display='none';return;}
    var terms=q.split(/\s+/).filter(function(t){return t.length>1;});
    if(!terms.length){resultCount.textContent='';noResults.style.display='none';return;}
    var matches=index.filter(function(page){
      var haystack=(page.title+' '+page.excerpt+' '+(page.headings||[]).join(' ')).toLowerCase();
      return terms.every(function(t){return haystack.indexOf(t)!==-1;});
    });
    resultCount.textContent=matches.length+' result'+(matches.length!==1?'s':'');
    noResults.style.display=matches.length?'none':'block';
    matches.forEach(function(page){
      var div=document.createElement('div');div.className='result';
      var a=document.createElement('a');a.href=page.path;a.textContent=page.title;
      var path=document.createElement('div');path.className='path';path.textContent=page.path;
      var excerpt=document.createElement('div');excerpt.className='excerpt';
      excerpt.innerHTML=highlightExcerpt(page.excerpt.substring(0,300),terms);
      div.appendChild(a);div.appendChild(path);div.appendChild(excerpt);
      if(page.headings&&page.headings.length){
        var hdiv=document.createElement('div');hdiv.className='headings';
        page.headings.slice(0,6).forEach(function(h){
          var s=document.createElement('span');s.textContent='§ '+h;hdiv.appendChild(s);
        });
        div.appendChild(hdiv);
      }
      resultsDiv.appendChild(div);
    });
  }

  var debounceTimer;
  searchInput.addEventListener('input',function(){
    clearTimeout(debounceTimer);
    debounceTimer=setTimeout(function(){search(searchInput.value);},200);
  });

  // Parse URL ?q= parameter for direct links
  var params=new URLSearchParams(window.location.search);
  var initialQ=params.get('q');
  if(initialQ){searchInput.value=initialQ;search(initialQ);}
})();

// Theme toggle
(function(){
  var btn=document.getElementById('themeToggle');
  function applyTheme(t){
    document.documentElement.setAttribute('data-theme',t);
    btn.textContent=(t==='light')?'\u2600':'\u263E';
    localStorage.setItem('{{PROJECT_THEME_KEY}}-theme',t);
  }
  var saved=localStorage.getItem('{{PROJECT_THEME_KEY}}-theme')||(window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');
  applyTheme(saved);
  btn.addEventListener('click',function(){applyTheme(document.documentElement.getAttribute('data-theme')==='light'?'dark':'light');});
})();
// Back to top
(function(){var b=document.getElementById('backToTop');window.addEventListener('scroll',function(){b.classList.toggle('visible',window.scrollY>400);});b.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});})();
// Keyboard navigation: / focuses search input
(function(){document.addEventListener('keydown',function(e){if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.isContentEditable)return;if(e.key==='/'){e.preventDefault();var si=document.getElementById('searchInput');if(si)si.focus();}});})();
</script>
